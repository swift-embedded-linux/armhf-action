name: Test Install SDKs (armv6)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-armv6:
    strategy:
      fail-fast: false
      matrix:
        swift-version:
          - '6.0'
          - '6.0.1'
          - '6.0.2'
          - '6.0.3'
          - '6.1'
          - '6.1.1'
          - '6.1.2'
          - '6.1.3'
          - '6.2'
          - '6.2.1'
          - '6.2.2'
          - '6.2.3'
          - '6.2.4'
        distribution:
          - raspios-bullseye
          - raspios-bookworm
          - raspios-trixie
    name: ${{ matrix.swift-version }}, ${{ matrix.distribution }}
    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift-version }}
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/actions/test-install-sdk
      with:
        swift-version: ${{ matrix.swift-version }}
        distribution: ${{ matrix.distribution }}
        arch: armv6
